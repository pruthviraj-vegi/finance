{% load static %}
<!-- Sidebar Navigation -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar__header">
    <div class="sidebar__logo">
      <svg width="36" height="36" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="navLogoGrad" x1="0" y1="0" x2="48" y2="48">
            <stop offset="0%" stop-color="#7C9CFF" />
            <stop offset="100%" stop-color="#34D399" />
          </linearGradient>
        </defs>
        <rect x="4" y="8" width="40" height="32" rx="6" stroke="url(#navLogoGrad)" stroke-width="2.5" fill="none" />
        <path d="M4 16H44" stroke="url(#navLogoGrad)" stroke-width="2" opacity="0.5" />
        <circle cx="24" cy="28" r="6" stroke="url(#navLogoGrad)" stroke-width="2" fill="none" />
        <path d="M24 22V28L28 30" stroke="url(#navLogoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <div class="sidebar__brand">
      <span class="sidebar__brand-name">My Finace</span>
      <span class="sidebar__brand-tagline">Finance</span>
    </div>
    <button class="sidebar__collapse-btn" id="sidebarCollapseBtn" aria-label="Collapse sidebar">
      <svg class="collapse-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>
    <button class="sidebar__close" id="sidebarClose" aria-label="Close sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <nav class="sidebar__nav">
    <div class="nav-section">
      <span class="nav-section__label">OVERVIEW</span>
      <a href="{% url 'base:home' %}" class="nav-item {% if active_page == 'dashboard' %}nav-item--active{% endif %}" id="nav-dashboard" data-tooltip="Dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-section__label">FINANCE</span>
      
      <a href="{% url 'ledger:contact_list' %}" class="nav-item {% if active_page == 'contacts' %}nav-item--active{% endif %}" id="nav-contacts" data-tooltip="Contacts">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Contacts</span>
      </a>
      <a href="{% url 'ledger:transaction_list' %}" class="nav-item {% if active_page == 'transactions' %}nav-item--active{% endif %}" id="nav-transactions" data-tooltip="Transactions">
        <svg class="nav-icon" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Transactions</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="nav-section__label">EXPENSE TRACKER</span>
      <a href="{% url 'expense:transaction_list' %}" class="nav-item {% if active_page == 'expense_transactions' %}nav-item--active{% endif %}" id="nav-expense-transactions" data-tooltip="Expenses">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        <span>Expenses</span>
      </a>
      <a href="{% url 'expense:category_list' %}" class="nav-item {% if active_page == 'expense_categories' %}nav-item--active{% endif %}" id="nav-expense-categories" data-tooltip="Categories">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>Categories</span>
      </a>
      <a href="{% url 'expense:recurring_dashboard' %}" class="nav-item {% if active_page == 'recurring_dashboard' %}nav-item--active{% endif %}" id="nav-recurring-dashboard" data-tooltip="Recurring Dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        <span>Recurring Dashboard</span>
      </a>
      <a href="{% url 'expense:recurring_item_list' %}" class="nav-item {% if active_page == 'recurring' or active_page == 'recurring_items' %}nav-item--active{% endif %}" id="nav-recurring-items" data-tooltip="Recurring Items">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
        <span>Recurring Items</span>
      </a>
    </div>


    <div class="nav-section">
      <span class="nav-section__label">SETTINGS</span>
      <a href="#" class="nav-item {% if active_page == 'settings' %}nav-item--active{% endif %}" id="nav-settings" data-tooltip="Settings">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Settings</span>
      </a>
    </div>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__user" data-tooltip="{{ user.full_name|default:'User' }}">
      <div class="sidebar__avatar">{{ user.first_name|default:"U"|first }}</div>
      <div class="sidebar__user-info">
        <span class="sidebar__user-role">{{ user.phone_number }}</span>
      </div>
    </div>
  </div>
</aside>
<div class="sidebar__overlay" id="sidebarOverlay"></div>
