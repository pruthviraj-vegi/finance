{% extends "base.html" %}
{% load static %}

{% block title %}Contacts — My Finance{% endblock %}

{% block page_title %}Contacts{% endblock %}

{% block content %}
<!-- Search & Add Bar -->
<form id="contactFilterForm" class="filter-bar">
  <div class="d-flex gap-12 flex-wrap flex-1 align-center">
  <div class="search-wrapper--sm flex-1" style="max-width: 300px;">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="contactSearch" name="search" placeholder="Search contacts..." autocomplete="off" />
  </div>
  </div>
  <a href="{% url 'ledger:contact_create' %}" class="btn btn--primary btn--compact" id="addContactBtn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line><line x1="8" y1="12" x2="16" y2="12"></line>
    </svg>
    <span>Add Contact</span>
  </a>
</form>

<!-- Contacts Container -->
<div id="contactTableContainer" class="space-y-2 animate-cardup-delayed">
  <div class="loader-placeholder">
    <span class="loader-spinner"></span>
    <p class="mt-8">Loading contacts...</p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const containerId = "contactTableContainer";
    const formId = "contactFilterForm";
    const fetchUrl = "{% url 'ledger:contact_fetch' %}";

    // Initialize AJAX Table with filters and sorting
    initTableAjax(
      formId,
      containerId,
      fetchUrl,
      {
        autoLoad: true,
        sortable: true,
        inlinePagination: true,
        defaultParams: {
          sort: "name"
        }
      },
      true // Include text inputs for debounced search as user types
    );

    // Initialize event delegation for column sorting
    initTableSorting(containerId);
  });
</script>
{% endblock %}
