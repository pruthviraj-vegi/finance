{% extends "base.html" %}
{% load static %}

{% block title %}Transactions — My Finance{% endblock %}

{% block page_title %}Transactions{% endblock %}

{% block content %}
<!-- Search & Filters & Add Bar -->
<form id="transactionFilterForm" class="filter-bar flex-col" style="align-items: stretch;">
  <!-- Top Row: Search -->
  <div class="search-wrapper--sm" style="max-width: none;">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="transactionSearch" name="search" placeholder="Search contacts, reason..." autocomplete="off" style="width: 100%;" />
  </div>

  <!-- Bottom Row: Filters and Add Button -->
  <div class="filter-bar-controls d-flex justify-between align-center gap-8">
    <div class="d-flex gap-8 align-center flex-nowrap">
      <!-- Contact Filter -->
      <select id="filterContact" name="contact" class="form-select form-select--sm" style="width: auto;">
        <option value="">All Contacts</option>
        {% for contact in contacts %}
          <option value="{{ contact.id }}">{{ contact.name }}</option>
        {% endfor %}
      </select>
  
      <!-- Direction Filter -->
      <select id="filterDirection" name="direction" class="form-select form-select--sm" style="width: auto;">
        <option value="">All Directions</option>
        {% for val, label in directions %}
          <option value="{{ val }}">{{ label }}</option>
        {% endfor %}
      </select>
  
      <!-- Status Filter -->
      <select id="filterStatus" name="status" class="form-select form-select--sm" style="width: auto;">
        <option value="">All Statuses</option>
        {% for val, label in statuses %}
          <option value="{{ val }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Add Button -->
    <a href="{% url 'ledger:transaction_create' %}" class="btn btn--primary btn--compact" id="addTransactionBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line><line x1="8" y1="12" x2="16" y2="12"></line>
      </svg>
      <span>Add</span><span class="hidden sm:inline">&nbsp;Transaction</span>
    </a>
  </div>
</form>

<!-- Transactions Container -->
<div id="transactionTableContainer" class="space-y-2 animate-cardup-delayed">
  <div class="loader-placeholder">
    <span class="loader-spinner"></span>
    <p class="mt-8">Loading transactions...</p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const containerId = "transactionTableContainer";
    const formId = "transactionFilterForm";
    const fetchUrl = "{% url 'ledger:transaction_fetch' %}";

    // Initialize AJAX Table with filters and sorting
    initTableAjax(
      formId,
      containerId,
      fetchUrl,
      {
        autoLoad: true,
        sortable: true,
        inlinePagination: true,
        defaultParams: {
          sort: "-date"
        }
      },
      true // Include text inputs for debounced search as user types
    );

    // Initialize event delegation for column sorting
    initTableSorting(containerId);
  });
</script>
{% endblock %}
